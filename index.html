<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Narada Travels — Экскурсии из Дананга</title>
  <meta name="description" content="Премиальные экскурсии из Дананга с русскоязычным гидом. Трансфер от отеля включён." />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- GSAP + ScrollTrigger CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"Segoe UI"', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* ─── NAV ───────────────────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 64px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 clamp(24px, 5vw, 60px);
      /* Glass backdrop */
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0) 100%
      );
    }

    .nav-left {
      display: flex;
      gap: clamp(20px, 3vw, 40px);
      align-items: center;
    }

    .nav-link {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.88);
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: color 0.2s ease;
      white-space: nowrap;
    }
    .nav-link:hover { color: #fff; }

    .nav-logo {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .nav-logo img {
      height: 40px;
      width: 40px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .nav-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .btn-nav {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 980px;
      padding: 8px 20px;
      text-decoration: none;
      letter-spacing: -0.01em;
      white-space: nowrap;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.25s ease, border-color 0.25s ease;
    }
    .btn-nav:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.7);
    }

    /* ─── HERO ──────────────────────────────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Photo layer — animated by GSAP */
    .hero__photo {
      position: absolute;
      inset: -10%;          /* extra space for parallax without white edges */
      will-change: transform;
      transform-origin: center center;
    }
    .hero__photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    /* Dual vignette — dark top & bottom, clear centre */
    .hero__gradient {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(0,0,0,0.72) 0%,
          rgba(0,0,0,0)    30%,
          rgba(0,0,0,0)    60%,
          rgba(0,0,0,0.80) 100%
        );
      z-index: 1;
      pointer-events: none;
    }

    /* Content */
    .hero__content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 clamp(24px, 6vw, 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      /* will be animated */
      opacity: 0;
    }

    .hero__eyebrow {
      font-size: clamp(11px, 1.5vw, 14px);
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    .hero__title {
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.0;
      color: #fff;
      /* Subtle luminous text shadow */
      text-shadow:
        0 2px 40px rgba(0,0,0,0.4),
        0 0 80px rgba(255,255,255,0.06);
    }

    .hero__subtitle {
      font-size: clamp(15px, 2vw, 19px);
      font-weight: 400;
      letter-spacing: -0.01em;
      color: rgba(255,255,255,0.70);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero__subtitle::before,
    .hero__subtitle::after {
      content: '';
      display: block;
      width: clamp(24px, 3vw, 40px);
      height: 1px;
      background: rgba(255,255,255,0.3);
    }

    /* CTA button — Apple pill */
    .btn-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 16px 36px;
      background: #fff;
      color: #0a0a0a;
      font-size: clamp(15px, 1.6vw, 17px);
      font-weight: 600;
      letter-spacing: -0.02em;
      border-radius: 980px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.3s ease,
                  background 0.2s ease;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    }
    .btn-cta:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .btn-cta:active { transform: scale(0.98); }

    .btn-cta svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      transition: transform 0.25s ease;
    }
    .btn-cta:hover svg { transform: translateX(3px); }

    /* ─── Scroll indicator ──────────────────────────────────────── */
    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0; /* animated in */
    }
    .scroll-hint__label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
    .scroll-hint__line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
      animation: scrollLine 2s ease-in-out infinite;
    }
    @keyframes scrollLine {
      0%   { transform: scaleY(0); transform-origin: top; opacity: 1; }
      50%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
      51%  { transform: scaleY(1); transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; opacity: 0.3; }
    }

    /* ─── Placeholder section below hero ───────────────────────── */
    .below-fold {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: rgba(255,255,255,0.15);
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ─── Mobile nav collapse ───────────────────────────────────── */
    @media (max-width: 600px) {
      .nav-left { display: none; }
      .nav { grid-template-columns: auto 1fr; gap: 0; }
      .nav-logo { justify-content: flex-start; }
      .nav-right { grid-column: 2; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════ NAV ═══════════════════ -->
  <nav class="nav" id="mainNav">
    <div class="nav-left">
      <a href="#tours"  class="nav-link">Экскурсии</a>
      <a href="#guide"  class="nav-link">Гид</a>
      <a href="#faq"    class="nav-link">FAQ</a>
    </div>

    <div class="nav-logo">
      <a href="/">
        <img src="images/logo.jpg" alt="Narada Travels" />
      </a>
    </div>

    <div class="nav-right">
      <a href="https://wa.me/84123456789" target="_blank" rel="noopener" class="btn-nav">
        Написать нам
      </a>
    </div>
  </nav>


  <!-- ═══════════════════ HERO ═══════════════════ -->
  <section class="hero" id="hero">

    <!-- Background photo — parallax layer -->
    <div class="hero__photo" id="heroPhoto">
      <img
        src="images/hero.jpg"
        alt="Панорама Дананга"
        fetchpriority="high"
        decoding="async"
      />
    </div>

    <!-- Dual-vignette overlay -->
    <div class="hero__gradient"></div>

    <!-- Main content -->
    <div class="hero__content" id="heroContent">
      <p class="hero__eyebrow">Вьетнам · Да Нанг</p>

      <h1 class="hero__title">
        Экскурсии<br />из Дананга
      </h1>

      <p class="hero__subtitle">
        С русскоязычным гидом&nbsp;·&nbsp;Трансфер от отеля
      </p>

      <a href="#tours" class="btn-cta">
        Выбрать экскурсию
        <!-- Arrow icon -->
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <!-- Scroll hint -->
    <div class="scroll-hint" id="scrollHint">
      <div class="scroll-hint__line"></div>
      <span class="scroll-hint__label">Листать</span>
    </div>

  </section>


  <!-- ═══════════════════ BELOW FOLD (placeholder) ═══════════════════ -->
  <div class="below-fold" id="tours">
    Экскурсии — coming soon
  </div>


  <!-- ═══════════════════ GSAP ANIMATIONS ═══════════════════ -->
  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* ── 1. ENTRANCE: photo zoom + content fade-up ── */
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Photo: scale 1.1 → 1.0 over 2s
    tl.fromTo(
      '#heroPhoto',
      { scale: 1.1 },
      { scale: 1.0, duration: 2.2, ease: 'power2.out' },
      0
    );

    // Content: 3-step stagger from below
    tl.fromTo(
      '#heroContent',
      { opacity: 0, y: 48 },
      { opacity: 1, y: 0, duration: 1.1, ease: 'power3.out' },
      0.35
    );

    // Scroll hint fades in last
    tl.fromTo(
      '#scrollHint',
      { opacity: 0, y: 10 },
      { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' },
      1.4
    );

    /* ── 2. SCROLL PARALLAX on hero photo ── */
    ScrollTrigger.create({
      trigger: '#hero',
      start: 'top top',
      end: 'bottom top',
      scrub: 1.2,
      onUpdate: (self) => {
        // Translate photo downward as user scrolls — true parallax depth
        const yOffset = self.progress * 14; // 14% vertical travel
        gsap.set('#heroPhoto', { yPercent: yOffset });
      },
    });

    /* ── 3. SCROLL: fade out hero content on scroll ── */
    gsap.to('#heroContent', {
      opacity: 0,
      y: -30,
      ease: 'none',
      scrollTrigger: {
        trigger: '#hero',
        start: 'top top',
        end: '35% top',
        scrub: 0.8,
      },
    });

    /* ── 4. NAV: transparent → frosted glass on scroll ── */
    ScrollTrigger.create({
      trigger: '#hero',
      start: 'top top',
      end: '10% top',
      onLeave: () => {
        gsap.to('#mainNav', {
          background: 'rgba(10,10,10,0.82)',
          backdropFilter: 'blur(20px)',
          duration: 0.4,
          ease: 'power2.out',
        });
      },
      onEnterBack: () => {
        gsap.to('#mainNav', {
          background: 'linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 100%)',
          backdropFilter: 'blur(0px)',
          duration: 0.4,
          ease: 'power2.out',
        });
      },
    });

    /* ── 5. Smooth scroll for nav links ── */
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', (e) => {
        const target = document.querySelector(anchor.getAttribute('href'));
        if (!target) return;
        e.preventDefault();
        gsap.to(window, {
          scrollTo: target,
          duration: 1.2,
          ease: 'power3.inOut',
        });
      });
    });
  </script>

</body>
</html>
