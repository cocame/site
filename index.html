<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Narada Travels — Экскурсии из Дананга</title>
  <meta name="description" content="Премиальные экскурсии из Дананга с русскоязычным гидом. Трансфер от отеля включён." />

  <!-- Inter — единственный шрифт -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* ─── NAV ───────────────────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 64px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 clamp(24px, 5vw, 60px);
      background: transparent;
      border-bottom: 1px solid transparent;
      /* GSAP handles all background/blur transitions — no CSS transition here */
    }

    .nav-left {
      display: flex;
      gap: clamp(20px, 3vw, 40px);
      align-items: center;
    }

    .nav-link {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.88);
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: color 0.2s ease;
      white-space: nowrap;
    }
    .nav-link:hover { color: #fff; }

    .nav-logo {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .nav-logo img {
      height: 40px;
      width: 40px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .nav-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .btn-nav {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 980px;
      padding: 8px 20px;
      text-decoration: none;
      letter-spacing: -0.01em;
      white-space: nowrap;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.25s ease, border-color 0.25s ease;
    }
    .btn-nav:hover {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.65);
    }

    /* ─── HERO ──────────────────────────────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 640px;
      background: #000;
      overflow: hidden;
      /* Left-aligned, bottom — Apple layout */
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: clamp(80px, 10vh, 120px);
      padding-left: clamp(24px, 6vw, 80px);
      padding-right: clamp(24px, 6vw, 80px);
    }

    /* Photo — Ken Burns via GSAP, parallax on scroll */
    .hero__photo {
      position: absolute;
      inset: -12%;
      will-change: transform;
      transform-origin: center center;
    }
    .hero__photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    /* Gradient — light at top, strong at bottom for text legibility */
    .hero__gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.15)  0%,
        rgba(0,0,0,0.08) 25%,
        rgba(0,0,0,0.40) 60%,
        rgba(0,0,0,0.75) 100%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* Content block — left, bottom */
    .hero__content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      max-width: 820px;
    }

    /* Caption — minimal, no gold */
    .hero__eyebrow {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 22px;
      opacity: 0; /* GSAP */
    }

    /* Headline */
    .hero__title {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: #ffffff;
      margin-bottom: 0;
    }

    /* Word wrappers for stagger animation */
    .hero__title .word {
      display: inline-block;
      overflow: hidden;
      line-height: 1.1;
      vertical-align: bottom;
    }
    .hero__title .word + .word {
      margin-left: 0.22em;
    }
    .hero__title .word-inner {
      display: inline-block;
      opacity: 0;
      transform: translateY(32px);
      will-change: transform, opacity;
    }

    /* Subheadline */
    .hero__subtitle {
      font-size: clamp(17px, 2vw, 21px);
      font-weight: 400;
      color: rgba(255,255,255,0.65);
      line-height: 1.5;
      letter-spacing: -0.01em;
      margin-top: 20px;
      margin-bottom: 36px;
      opacity: 0; /* GSAP */
    }

    /* CTA — Apple white pill */
    .btn-cta {
      display: inline-flex;
      align-items: center;
      padding: 16px 32px;
      background: #ffffff;
      color: #1d1d1f;
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      border-radius: 980px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      opacity: 0; /* GSAP */
      will-change: transform, opacity;
      transition: opacity 0.3s ease,
                  transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-cta:hover {
      opacity: 0.85 !important;
      transform: scale(1.03);
    }
    .btn-cta:active {
      transform: scale(0.97);
      transition-duration: 0.1s;
    }

    /* Scroll indicator — right side, vertical text */
    .scroll-hint {
      position: absolute;
      bottom: clamp(28px, 4vh, 48px);
      right: clamp(24px, 4vw, 56px);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0; /* GSAP */
    }
    .scroll-hint__label {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      writing-mode: vertical-rl;
    }
    .scroll-hint__line {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.45), transparent);
      animation: scrollLine 2.4s ease-in-out infinite;
    }
    @keyframes scrollLine {
      0%   { transform: scaleY(0); transform-origin: top; opacity: 1; }
      50%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
      51%  { transform: scaleY(1); transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
    }

    /* ─── TOUR CARD SECTION ─────────────────────────────────────── */
    .tour-section {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 560px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }

    .tour-section__photo {
      position: absolute;
      inset: 0;
      will-change: transform;
    }
    .tour-section__photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .tour-section__gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.12)  0%,
        rgba(0,0,0,0)     22%,
        rgba(0,0,0,0.04)  55%,
        rgba(0,0,0,0.82) 100%
      );
      pointer-events: none;
    }

    .tour-section__content {
      position: relative;
      z-index: 2;
      padding: clamp(36px, 6vw, 80px) clamp(28px, 6vw, 80px);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      max-width: min(720px, 90vw);
    }

    .tour-section__tag {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .tour-section__title {
      font-size: clamp(2rem, 5.5vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: #fff;
      text-shadow: 0 2px 40px rgba(0,0,0,0.5);
    }

    .tour-section__subtitle {
      font-size: clamp(15px, 2vw, 20px);
      font-weight: 400;
      letter-spacing: -0.01em;
      color: rgba(255,255,255,0.72);
      text-shadow: 0 1px 8px rgba(0,0,0,0.45);
    }

    .btn-tour {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 14px 30px;
      background: rgba(255,255,255,0.10);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: clamp(14px, 1.5vw, 16px);
      font-weight: 500;
      letter-spacing: -0.01em;
      border: 1px solid rgba(255,255,255,0.40);
      border-radius: 980px;
      text-decoration: none;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: background 0.25s ease,
                  border-color 0.25s ease,
                  transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-tour:hover {
      background: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.75);
      transform: scale(1.03);
    }
    .btn-tour:active { transform: scale(0.97); }
    .btn-tour svg {
      width: 15px; height: 15px; flex-shrink: 0;
      transition: transform 0.25s ease;
    }
    .btn-tour:hover svg { transform: translateX(3px); }

    /* ─── Mobile ────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .nav-left { display: none; }
      .nav { grid-template-columns: auto 1fr; gap: 0; }
      .nav-logo { justify-content: flex-start; }
      .nav-right { grid-column: 2; }
      .hero__title { letter-spacing: -0.025em; }
      .scroll-hint { display: none; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════ NAV ═══════════════════ -->
  <nav class="nav" id="mainNav">
    <div class="nav-left">
      <a href="#tours" class="nav-link">Экскурсии</a>
      <a href="#guide" class="nav-link">Гид</a>
      <a href="#faq"   class="nav-link">FAQ</a>
    </div>

    <div class="nav-logo">
      <a href="/">
        <img src="images/logo.jpg" alt="Narada Travels" />
      </a>
    </div>

    <div class="nav-right">
      <a href="https://wa.me/84123456789" target="_blank" rel="noopener" class="btn-nav">
        Написать нам
      </a>
    </div>
  </nav>


  <!-- ═══════════════════ HERO ═══════════════════ -->
  <section class="hero" id="hero">

    <!-- Background — Ken Burns on load, parallax on scroll -->
    <div class="hero__photo" id="heroPhoto">
      <img
        src="images/danang-arts/danang-15.jpg"
        alt="Панорама Дананга"
        fetchpriority="high"
        decoding="async"
      />
    </div>

    <!-- Gradient overlay -->
    <div class="hero__gradient"></div>

    <!-- Content — left-aligned, anchored to bottom -->
    <div class="hero__content" id="heroContent">

      <p class="hero__eyebrow" id="heroEyebrow">Вьетнам · Да Нанг</p>

      <h1 class="hero__title" id="heroTitle">
        Добро пожаловать<br>в Дананг
      </h1>

      <p class="hero__subtitle" id="heroSubtitle">
        Экскурсии с русскоязычным гидом · Трансфер от отеля
      </p>

      <a href="#tours" class="btn-cta" id="heroCta">
        Выбрать экскурсию
      </a>

    </div>

    <!-- Scroll indicator -->
    <div class="scroll-hint" id="scrollHint">
      <div class="scroll-hint__line"></div>
      <span class="scroll-hint__label">Scroll</span>
    </div>

  </section>


  <!-- ═══════════════════ BA NA HILLS ═══════════════════ -->
  <section class="tour-section" id="tours">

    <div class="tour-section__photo" id="banaPhoto">
      <img
        src="images/bana.jpg"
        alt="Ба На Хиллс — Золотой мост"
        decoding="async"
        loading="lazy"
      />
    </div>

    <div class="tour-section__gradient"></div>

    <div class="tour-section__content" id="banaContent">
      <p class="tour-section__tag">Экскурсия · Ба На Хиллс</p>

      <h2 class="tour-section__title" id="banaTitle">
        Ба На Хиллс —<br />Золотой мост
      </h2>

      <p class="tour-section__subtitle">
        Путешествие в облака · от 47$
      </p>

      <a href="#" class="btn-tour">
        Узнать подробнее
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

  </section>


  <!-- ═══════════════════ GSAP ═══════════════════ -->
  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* ─────────────────────────────────────────────
       WORD SPLITTER
       Wraps each word in .word > .word-inner
       Preserves <br> line breaks
    ───────────────────────────────────────────── */
    (function splitTitle() {
      const el = document.getElementById('heroTitle');
      const raw = el.innerHTML;
      const segments = raw.split(/(<br\s*\/?>)/gi);
      let html = '';
      segments.forEach(seg => {
        if (/^<br/i.test(seg)) {
          html += seg; // keep line break
        } else {
          seg.trim().split(/\s+/).filter(Boolean).forEach((word, i, arr) => {
            html += `<span class="word"><span class="word-inner">${word}</span></span>`;
            if (i < arr.length - 1) html += ' ';
          });
        }
      });
      el.innerHTML = html;
    })();


    /* ─────────────────────────────────────────────
       ENTRANCE SEQUENCE
    ───────────────────────────────────────────── */
    const intro = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // 1. Ken Burns — photo scales from 1.0 to 1.06 over 8s
    intro.fromTo(
      '#heroPhoto',
      { scale: 1.0 },
      { scale: 1.06, duration: 8, ease: 'none' },
      0
    );

    // 2. Caption line
    intro.fromTo(
      '#heroEyebrow',
      { opacity: 0, y: 10 },
      { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' },
      0.25
    );

    // 3. Headline words — stagger fade + rise
    intro.fromTo(
      '#heroTitle .word-inner',
      { opacity: 0, y: 30 },
      { opacity: 1, y: 0, duration: 1.0, stagger: 0.08, ease: 'power3.out' },
      0.4
    );

    // 4. Subheadline — after headline clears (4 words × 0.08s stagger ≈ 0.32s + 0.4 start + 1s dur)
    intro.fromTo(
      '#heroSubtitle',
      { opacity: 0, y: 14 },
      { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' },
      0.9
    );

    // 5. CTA
    intro.fromTo(
      '#heroCta',
      { opacity: 0, y: 12 },
      { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out' },
      1.15
    );

    // 6. Scroll hint — last
    intro.fromTo(
      '#scrollHint',
      { opacity: 0 },
      { opacity: 1, duration: 0.8, ease: 'power2.out' },
      1.6
    );


    /* ─────────────────────────────────────────────
       SCROLL: PARALLAX on hero photo
    ───────────────────────────────────────────── */
    gsap.to('#heroPhoto', {
      yPercent: 20,
      ease: 'none',
      scrollTrigger: {
        trigger: '#hero',
        start: 'top top',
        end: 'bottom top',
        scrub: 1,
      },
    });


    /* ─────────────────────────────────────────────
       SCROLL: Fade hero content out
    ───────────────────────────────────────────── */
    gsap.to('#heroContent', {
      opacity: 0,
      y: -20,
      ease: 'none',
      scrollTrigger: {
        trigger: '#hero',
        start: 'top top',
        end: '28% top',
        scrub: 0.8,
      },
    });

    gsap.to('#scrollHint', {
      opacity: 0,
      ease: 'none',
      scrollTrigger: {
        trigger: '#hero',
        start: 'top top',
        end: '15% top',
        scrub: 0.6,
      },
    });


    /* ─────────────────────────────────────────────
       SCROLL: NAV — transparent → glass past 50px
    ───────────────────────────────────────────── */
    ScrollTrigger.create({
      trigger: 'body',
      start: '50px top',
      onEnter() {
        gsap.to('#mainNav', {
          background: 'rgba(0,0,0,0.72)',
          backdropFilter: 'blur(20px) saturate(180%)',
          borderBottomColor: 'rgba(255,255,255,0.08)',
          duration: 0.45,
          ease: 'power2.out',
          overwrite: 'auto',
        });
      },
      onLeaveBack() {
        gsap.to('#mainNav', {
          background: 'transparent',
          backdropFilter: 'blur(0px) saturate(100%)',
          borderBottomColor: 'transparent',
          duration: 0.45,
          ease: 'power2.out',
          overwrite: 'auto',
        });
      },
    });


    /* ─────────────────────────────────────────────
       BA NA HILLS — scroll-triggered animations
    ───────────────────────────────────────────── */
    gsap.fromTo(
      '#banaContent .tour-section__tag',
      { opacity: 0, y: 14 },
      {
        opacity: 1, y: 0, duration: 0.7, ease: 'power2.out',
        scrollTrigger: {
          trigger: '#tours',
          start: 'top 80%',
          toggleActions: 'play none none reverse',
        },
      }
    );

    gsap.fromTo(
      '#banaTitle',
      { opacity: 0, x: -80, skewX: 3 },
      {
        opacity: 1, x: 0, skewX: 0,
        duration: 1.0, ease: 'power3.out',
        scrollTrigger: {
          trigger: '#tours',
          start: 'top 72%',
          toggleActions: 'play none none reverse',
        },
      }
    );

    gsap.fromTo(
      ['#banaContent .tour-section__subtitle', '#banaContent .btn-tour'],
      { opacity: 0, x: -36 },
      {
        opacity: 1, x: 0,
        duration: 0.75, ease: 'power2.out',
        stagger: 0.12,
        scrollTrigger: {
          trigger: '#tours',
          start: 'top 65%',
          toggleActions: 'play none none reverse',
        },
      }
    );

    gsap.to('#banaPhoto', {
      yPercent: 12,
      ease: 'none',
      scrollTrigger: {
        trigger: '#tours',
        start: 'top bottom',
        end: 'bottom top',
        scrub: 1.5,
      },
    });


    /* ─────────────────────────────────────────────
       SMOOTH SCROLL for nav anchor links
    ───────────────────────────────────────────── */
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', e => {
        const target = document.querySelector(anchor.getAttribute('href'));
        if (!target) return;
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth' });
      });
    });
  </script>

</body>
</html>
