<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Narada Travels — Экскурсии из Дананга</title>
  <meta name="description" content="Премиальные экскурсии из Дананга с русскоязычным гидом. Трансфер от отеля включён." />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- GSAP + ScrollTrigger CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"Segoe UI"', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* ─── NAV ───────────────────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 64px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 clamp(24px, 5vw, 60px);
      /* Glass backdrop */
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0) 100%
      );
    }

    .nav-left {
      display: flex;
      gap: clamp(20px, 3vw, 40px);
      align-items: center;
    }

    .nav-link {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.88);
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: color 0.2s ease;
      white-space: nowrap;
    }
    .nav-link:hover { color: #fff; }

    .nav-logo {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .nav-logo img {
      height: 40px;
      width: 40px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .nav-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .btn-nav {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 980px;
      padding: 8px 20px;
      text-decoration: none;
      letter-spacing: -0.01em;
      white-space: nowrap;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.25s ease, border-color 0.25s ease;
    }
    .btn-nav:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.7);
    }

    /* ─── HERO — Dark Premium ───────────────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 600px;
      background: #0a0a0a;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Photo layer — animated by GSAP */
    .hero__photo {
      position: absolute;
      inset: -10%;
      will-change: transform;
      transform-origin: center center;
    }
    .hero__photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 35%;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    /* Dark premium overlay — 70% black + gold-tinted gradient */
    .hero__gradient {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          160deg,
          rgba(10,10,10,0.82) 0%,
          rgba(10,10,10,0.60) 40%,
          rgba(10,10,10,0.75) 100%
        ),
        linear-gradient(
          to bottom,
          rgba(0,0,0,0.55) 0%,
          rgba(0,0,0,0.10) 35%,
          rgba(0,0,0,0.10) 60%,
          rgba(0,0,0,0.88) 100%
        );
      z-index: 1;
      pointer-events: none;
    }

    /* Золотая горизонтальная черта — акцентный разделитель */
    .hero__gold-line {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        #C9A96E 30%,
        #e8c98a 50%,
        #C9A96E 70%,
        transparent 100%
      );
      z-index: 3;
      opacity: 0.7;
    }

    /* Content */
    .hero__content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 clamp(24px, 6vw, 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      opacity: 0;
      max-width: 1100px;
    }

    .hero__eyebrow {
      font-size: clamp(10px, 1.2vw, 13px);
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: #C9A96E;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .hero__eyebrow::before,
    .hero__eyebrow::after {
      content: '';
      display: block;
      width: clamp(24px, 3vw, 48px);
      height: 1px;
      background: linear-gradient(90deg, transparent, #C9A96E);
    }
    .hero__eyebrow::after {
      background: linear-gradient(90deg, #C9A96E, transparent);
    }

    .hero__title {
      font-size: clamp(3.2rem, 8.5vw, 7.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 0.95;
      color: #ffffff;
      text-shadow:
        0 0 120px rgba(201,169,110,0.12),
        0 4px 60px rgba(0,0,0,0.6);
      /* Тонкий золотой отблеск на первом слове */
    }
    .hero__title em {
      font-style: normal;
      background: linear-gradient(135deg, #e8c98a 0%, #C9A96E 50%, #a87c3e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero__subtitle {
      font-size: clamp(15px, 2vw, 20px);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.70);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .hero__subtitle .sep {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #C9A96E;
      flex-shrink: 0;
      opacity: 0.8;
    }

    /* CTA button — тёмный золотой */
    .btn-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
      padding: 16px 40px;
      background: linear-gradient(135deg, #C9A96E 0%, #a87c3e 100%);
      color: #0a0a0a;
      font-size: clamp(14px, 1.5vw, 16px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 8px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.3s ease,
                  filter 0.2s ease;
      box-shadow:
        0 4px 24px rgba(201,169,110,0.30),
        0 1px 0 rgba(255,255,255,0.15) inset;
    }
    .btn-cta:hover {
      transform: scale(1.04) translateY(-1px);
      box-shadow:
        0 12px 48px rgba(201,169,110,0.45),
        0 1px 0 rgba(255,255,255,0.15) inset;
      filter: brightness(1.08);
    }
    .btn-cta:active { transform: scale(0.98); }

    .btn-cta svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      transition: transform 0.25s ease;
    }
    .btn-cta:hover svg { transform: translateX(3px); }

    /* ─── Scroll indicator ──────────────────────────────────────── */
    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0; /* animated in */
    }
    .scroll-hint__label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
    .scroll-hint__line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
      animation: scrollLine 2s ease-in-out infinite;
    }
    @keyframes scrollLine {
      0%   { transform: scaleY(0); transform-origin: top; opacity: 1; }
      50%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
      51%  { transform: scaleY(1); transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; opacity: 0.3; }
    }

    /* ─── TOUR CARD SECTION ─────────────────────────────────────── */
    .tour-section {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 560px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }

    /* Photo */
    .tour-section__photo {
      position: absolute;
      inset: 0;
      will-change: transform;
    }
    .tour-section__photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    /* Gradient: subtle top, heavy bottom */
    .tour-section__gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.15)  0%,
        rgba(0,0,0,0)     25%,
        rgba(0,0,0,0.05)  55%,
        rgba(0,0,0,0.82) 100%
      );
      pointer-events: none;
    }

    /* Content — bottom-left */
    .tour-section__content {
      position: relative;
      z-index: 2;
      padding: clamp(36px, 6vw, 80px) clamp(28px, 6vw, 80px);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      max-width: min(720px, 90vw);
    }

    .tour-section__tag {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    .tour-section__title {
      font-size: clamp(2rem, 5.5vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: #fff;
      text-shadow: 0 2px 32px rgba(0,0,0,0.45);
      /* GSAP starts here — will be set by fromTo */
    }

    .tour-section__subtitle {
      font-size: clamp(15px, 2vw, 20px);
      font-weight: 400;
      letter-spacing: -0.01em;
      color: rgba(255,255,255,0.75);
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }

    /* Ghost outline button */
    .btn-tour {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 14px 32px;
      background: rgba(255,255,255,0.10);
      color: #fff;
      font-size: clamp(14px, 1.5vw, 16px);
      font-weight: 500;
      letter-spacing: -0.01em;
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 980px;
      text-decoration: none;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: background 0.25s ease,
                  border-color 0.25s ease,
                  transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .btn-tour:hover {
      background: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.80);
      transform: scale(1.03);
    }
    .btn-tour:active { transform: scale(0.97); }
    .btn-tour svg {
      width: 15px; height: 15px; flex-shrink: 0;
      transition: transform 0.25s ease;
    }
    .btn-tour:hover svg { transform: translateX(3px); }

    /* ─── Mobile nav collapse ───────────────────────────────────── */
    @media (max-width: 600px) {
      .nav-left { display: none; }
      .nav { grid-template-columns: auto 1fr; gap: 0; }
      .nav-logo { justify-content: flex-start; }
      .nav-right { grid-column: 2; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════ NAV ═══════════════════ -->
  <nav class="nav" id="mainNav">
    <div class="nav-left">
      <a href="#tours"  class="nav-link">Экскурсии</a>
      <a href="#guide"  class="nav-link">Гид</a>
      <a href="#faq"    class="nav-link">FAQ</a>
    </div>

    <div class="nav-logo">
      <a href="/">
        <img src="images/logo.jpg" alt="Narada Travels" />
      </a>
    </div>

    <div class="nav-right">
      <a href="https://wa.me/84123456789" target="_blank" rel="noopener" class="btn-nav">
        Написать нам
      </a>
    </div>
  </nav>


  <!-- ═══════════════════ HERO ═══════════════════ -->
  <section class="hero" id="hero">

    <!-- Gold accent line top -->
    <div class="hero__gold-line"></div>

    <!-- Background photo — parallax layer -->
    <div class="hero__photo" id="heroPhoto">
      <img
        src="images/hero.jpg"
        alt="Панорама Дананга"
        fetchpriority="high"
        decoding="async"
      />
    </div>

    <!-- Dark 70% overlay + gradient -->
    <div class="hero__gradient"></div>

    <!-- Main content -->
    <div class="hero__content" id="heroContent">

      <p class="hero__eyebrow">Вьетнам&nbsp;&nbsp;·&nbsp;&nbsp;Да Нанг</p>

      <h1 class="hero__title">
        <em>Экскурсии</em><br />из Дананга
      </h1>

      <p class="hero__subtitle" id="heroSubtitle">
        С русскоязычным гидом
        <span class="sep"></span>
        Трансфер от отеля
      </p>

      <a href="#tours" class="btn-cta">
        Выбрать экскурсию
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <!-- Scroll hint -->
    <div class="scroll-hint" id="scrollHint">
      <div class="scroll-hint__line"></div>
      <span class="scroll-hint__label">Листать</span>
    </div>

  </section>


  <!-- ═══════════════════ BA NA HILLS ═══════════════════ -->
  <section class="tour-section" id="tours">

    <div class="tour-section__photo" id="banaPhoto">
      <img
        src="images/bana.jpg"
        alt="Ба На Хиллс — Золотой мост"
        decoding="async"
        loading="lazy"
      />
    </div>

    <div class="tour-section__gradient"></div>

    <div class="tour-section__content" id="banaContent">
      <p class="tour-section__tag">Экскурсия · Ба На Хиллс</p>

      <h2 class="tour-section__title" id="banaTitle">
        Ба На Хиллс —<br />Золотой мост
      </h2>

      <p class="tour-section__subtitle">
        Путешествие в облака&nbsp;·&nbsp;от 47$
      </p>

      <a href="#" class="btn-tour">
        Узнать подробнее
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

  </section>


  <!-- ═══════════════════ GSAP ANIMATIONS ═══════════════════ -->
  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* ── 1. ENTRANCE: photo zoom + content fade-up ── */
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Photo: scale 1.1 → 1.0 over 2s
    tl.fromTo(
      '#heroPhoto',
      { scale: 1.1 },
      { scale: 1.0, duration: 2.2, ease: 'power2.out' },
      0
    );

    // Content: fade-up from below
    tl.fromTo(
      '#heroContent',
      { opacity: 0, y: 48 },
      { opacity: 1, y: 0, duration: 1.1, ease: 'power3.out' },
      0.35
    );

    // Subtitle — fade in with slight upward travel
    tl.fromTo(
      '#heroSubtitle',
      { opacity: 0, y: 16 },
      { opacity: 1, y: 0, duration: 1.1, ease: 'power2.out' },
      0.75
    );

    // Scroll hint fades in last
    tl.fromTo(
      '#scrollHint',
      { opacity: 0, y: 10 },
      { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' },
      1.4
    );

    /* ── 2. SCROLL PARALLAX on hero photo ── */
    ScrollTrigger.create({
      trigger: '#hero',
      start: 'top top',
      end: 'bottom top',
      scrub: 1.2,
      onUpdate: (self) => {
        // Translate photo downward as user scrolls — true parallax depth
        const yOffset = self.progress * 14; // 14% vertical travel
        gsap.set('#heroPhoto', { yPercent: yOffset });
      },
    });

    /* ── 3. SCROLL: fade out hero content on scroll ── */
    gsap.to('#heroContent', {
      opacity: 0,
      y: -30,
      ease: 'none',
      scrollTrigger: {
        trigger: '#hero',
        start: 'top top',
        end: '35% top',
        scrub: 0.8,
      },
    });

    /* ── 4. NAV: transparent → frosted glass on scroll ── */
    ScrollTrigger.create({
      trigger: '#hero',
      start: 'top top',
      end: '10% top',
      onLeave: () => {
        gsap.to('#mainNav', {
          background: 'rgba(10,10,10,0.82)',
          backdropFilter: 'blur(20px)',
          duration: 0.4,
          ease: 'power2.out',
        });
      },
      onEnterBack: () => {
        gsap.to('#mainNav', {
          background: 'linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 100%)',
          backdropFilter: 'blur(0px)',
          duration: 0.4,
          ease: 'power2.out',
        });
      },
    });

    /* ── 5. BA NA HILLS: title slides in from left on scroll ── */

    // Tag — fades up subtly first
    gsap.fromTo(
      '#banaContent .tour-section__tag',
      { opacity: 0, y: 14 },
      {
        opacity: 1, y: 0, duration: 0.7, ease: 'power2.out',
        scrollTrigger: {
          trigger: '#tours',
          start: 'top 80%',
          toggleActions: 'play none none reverse',
        },
      }
    );

    // Title — sweeps in from left with slight overshoot
    gsap.fromTo(
      '#banaTitle',
      { opacity: 0, x: -90, skewX: 4 },
      {
        opacity: 1, x: 0, skewX: 0,
        duration: 1.0, ease: 'power3.out',
        scrollTrigger: {
          trigger: '#tours',
          start: 'top 72%',
          toggleActions: 'play none none reverse',
        },
      }
    );

    // Subtitle + button — stagger after title
    gsap.fromTo(
      ['#banaContent .tour-section__subtitle', '#banaContent .btn-tour'],
      { opacity: 0, x: -40 },
      {
        opacity: 1, x: 0,
        duration: 0.75, ease: 'power2.out',
        stagger: 0.12,
        scrollTrigger: {
          trigger: '#tours',
          start: 'top 65%',
          toggleActions: 'play none none reverse',
        },
      }
    );

    // Parallax on Ba Na photo
    gsap.to('#banaPhoto', {
      yPercent: 12,
      ease: 'none',
      scrollTrigger: {
        trigger: '#tours',
        start: 'top bottom',
        end: 'bottom top',
        scrub: 1.5,
      },
    });

    /* ── 7. Smooth scroll for nav links ── */
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', (e) => {
        const target = document.querySelector(anchor.getAttribute('href'));
        if (!target) return;
        e.preventDefault();
        gsap.to(window, {
          scrollTo: target,
          duration: 1.2,
          ease: 'power3.inOut',
        });
      });
    });
  </script>

</body>
</html>
